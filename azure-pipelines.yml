trigger:
  - main

pool:
  vmImage: 'ubuntu-latest'

variables:
  buildConfiguration: 'Release'

stages:
  - stage: Build
    displayName: 'Build Stage'
    jobs:
      - job: BuildJob
        displayName: 'Build and Test Connectivity'
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: '3.9'
            displayName: 'Use Python 3.9'

          - script: |
              echo "=========================================="
              echo "Azure DevOps Pipeline - Connectivity Test"
              echo "=========================================="
              echo "Build ID: $(Build.BuildId)"
              echo "Build Number: $(Build.BuildNumber)"
              echo "Source Branch: $(Build.SourceBranch)"
              echo "Repository: $(Build.Repository.Name)"
              echo "Agent OS: $(Agent.OS)"
              echo "Agent Version: $(Agent.Version)"
              echo "=========================================="
            displayName: 'Display Build Information'

          - script: |
              python --version
              pip install --upgrade pip
            displayName: 'Setup Python Environment'

          - script: |
              echo "Running basic connectivity tests..."
              python -c "import socket; print(f'Hostname: {socket.gethostname()}')"
              python -c "import platform; print(f'Platform: {platform.platform()}')"
            displayName: 'Run Connectivity Tests'

          - script: |
              echo "Repository Contents:"
              ls -la
            displayName: 'List Repository Contents'

  - stage: Test
    displayName: 'Test Stage'
    dependsOn: Build
    condition: succeeded()
    jobs:
      - job: TestJob
        displayName: 'Run Tests'
        steps:
          - script: |
              echo "Running sample tests..."
              echo "Test 1: Filesystem access - PASSED"
              echo "Test 2: Environment variables - PASSED"
              echo "Test 3: Network connectivity - PASSED"
            displayName: 'Execute Tests'

  - stage: Deploy
    displayName: 'Deploy Stage'
    dependsOn: Test
    condition: succeeded()
    jobs:
      - job: DeployJob
        displayName: 'Deployment Verification'
        steps:
          - script: |
              echo "Deployment Stage - Ready for production"
              echo "All connectivity tests passed successfully!"
              echo "Pipeline completed at: $(System.TeamFoundationCollectionUri)"
            displayName: 'Verify Deployment Readiness'

          # ✅ CREATE ISSUE WORK ITEM VIA REST API
          - task: PowerShell@2
            displayName: 'Create Issue - Release Tracking'
            inputs:
              targetType: 'inline'
              script: |
                # Get current date/time
                $currentDate = Get-Date -Format "yyyy-MM-dd HH:mm:ss"
                
                # Azure DevOps variables
                $organization = "dev.azure.com/773612"
                $project = "Test"
                $token = "$(System.AccessToken)"
                $buildId = "$(Build.BuildId)"
                $buildNumber = "$(Build.BuildNumber)"
                $queuedBy = "$(Build.QueuedBy)"
                $sourceVersion = "$(Build.SourceVersion)"
                $sourceBranch = "$(Build.SourceBranch)"
                
                # Base64 encode token for authentication
                $auth = [System.Convert]::ToBase64String([System.Text.Encoding]::ASCII.GetBytes(":$token"))
                
                # Create JSON payload for Issue work item
                $workItemPayload = @(
                  @{
                    op    = "add"
                    path  = "/fields/System.Title"
                    value = "Release $(Build.BuildNumber) - Deployment in Progress"
                  }
                  @{
                    op    = "add"
                    path  = "/fields/System.Description"
                    value = "Build ID: $buildId`nCommit: $sourceVersion`nBranch: $sourceBranch`nTriggered by: $queuedBy`nCreated: $currentDate`n`nDeployment Status:`n✓ Build Completed`n⏳ Awaiting DEV Deployment Approval`n⏳ Awaiting ACC Deployment Approval`n⏳ Awaiting PROD Deployment Approval"
                  }
                  @{
                    op    = "add"
                    path  = "/fields/System.State"
                    value = "Doing"
                  }
                )
                
                # REST API endpoint for creating Issue work item
                $uri = "https://dev.azure.com/773612/Test/_apis/wit/workitems/`$Issue?api-version=7.0"
                
                try {
                  # Make REST API call to create work item
                  $response = Invoke-RestMethod `
                    -Uri $uri `
                    -Method POST `
                    -ContentType "application/json-patch+json" `
                    -Headers @{ Authorization = "Basic $auth" } `
                    -Body ($workItemPayload | ConvertTo-Json -AsArray)
                  
                  Write-Host "=========================================="
                  Write-Host "✓ Issue Created Successfully!"
                  Write-Host "=========================================="
                  Write-Host "Issue ID: $($response.id)"
                  Write-Host "Issue Title: $($response.fields.'System.Title')"
                  Write-Host "Issue State: $($response.fields.'System.State')"
                  Write-Host "Issue URL: $($response.url)"
                  Write-Host "=========================================="
                  
                  # Save work item ID as pipeline variable for later use in Release pipeline
                  Write-Output "##vso[task.setvariable variable=WorkItemId]$($response.id)"
                  Write-Output "##vso[task.setvariable variable=WorkItemId;isOutput=true]$($response.id)"
                }
                catch {
                  Write-Error "Failed to create issue: $_"
                  exit 1
                }
            env:
              SYSTEM_ACCESSTOKEN: $(System.AccessToken)
            condition: succeeded()
